<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vocab</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1c1c28" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main>
  <section id="view-review" class="view active">
    <div class="review-header">
      <span id="review-count"></span>
    </div>
    <div id="review-empty" style="display:none;">
      <p>All caught up. Nothing due right now.</p>
    </div>
    <div id="flashcard">
      <div class="card-category" id="card-category"></div>
      <div class="card-word" id="card-word"></div>
      <div class="card-back" id="card-back"></div>
      <div class="card-hint" id="card-hint">tap to reveal</div>
    </div>
    <div id="review-controls" class="review-controls">
      <button id="btn-again" class="grade-btn grade-again">Didn't know</button>
      <button id="btn-good" class="grade-btn grade-good">Knew it</button>
    </div>
  </section>

  <section id="view-add" class="view">
    <h2>Add a word</h2>
    <form id="quick-add-form">
      <input type="text" id="quick-add-input" placeholder="Type a word..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <h3>Needs details (<span id="needs-details-count">0</span>)</h3>
    <div id="needs-details-list"></div>
  </section>

  <section id="view-browse" class="view">
    <div class="browse-toolbar">
      <input type="text" id="browse-search" placeholder="Search..." />
      <select id="browse-filter">
        <option value="all">all</option>
      </select>
    </div>
    <div id="browse-count"></div>
    <div id="browse-list"></div>
  </section>
</main>

<nav id="tab-bar">
  <button class="tab-btn active" data-view="review">Review</button>
  <button class="tab-btn" data-view="add">Add</button>
  <button class="tab-btn" data-view="browse">Browse</button>
</nav>

<datalist id="group-datalist"></datalist>

<script src="seed.js"></script>
<script src="app.js"></script>
</body>
</html>
